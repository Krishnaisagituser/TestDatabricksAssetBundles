# This is a Databricks asset bundle definition for demo_dabs.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: demo_dabs
  uuid: dfb5ad39-9051-4af3-9043-e0ceb7d7615e

include:
  - resources/*.yml
  - resources/*/*.yml


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-f07dc9ba-716c.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-f07dc9ba-716c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/krishnakumarpkk2002@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: krishnakumarpkk2002@gmail.com
        level: CAN_MANAGE
