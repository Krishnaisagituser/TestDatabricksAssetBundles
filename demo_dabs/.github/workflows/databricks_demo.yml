name: Databricks Free Demo Bundle Deployment

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should-deploy: ${{ steps.set-env.outputs.should-deploy }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  validate:
    runs-on: ubuntu-latest
    needs: determine-environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        
        run: |
          cd demo_dabs
          databricks bundle validate -t ${{ needs.determine-environment.outputs.environment }}
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_WORKSPACE_URL_DEMO }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEMO }}

  deploy:
    runs-on: ubuntu-latest
    needs: [determine-environment, validate]
    if: needs.determine-environment.outputs.should-deploy == 'true'
    env:
      ENVIRONMENT: ${{ needs.determine-environment.outputs.environment }}
      DATABRICKS_HOST: ${{ vars.DATABRICKS_WORKSPACE_URL_DEMO }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEMO }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy Bundle
        run: |
          cd demo_dabs
          databricks bundle deploy -t $ENVIRONMENT

      - name: Deployment summary
        run: |
          echo "Deployment completed successfully!"
          echo "Environment: $ENVIRONMENT"
          echo "Workspace: $DATABRICKS_HOST"
          echo "Branch: ${{ github.ref }}"
          echo "Triggered by: ${{ github.event_name }}"

  notify:
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy]
    if: always() && needs.determine-environment.outputs.should-deploy == 'true'
    steps:
      - name: Notify deployment status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "Deployment to ${{ needs.determine-environment.outputs.environment }} succeeded!"
          else
            echo "Deployment to ${{ needs.determine-environment.outputs.environment }} failed!"
            exit 1
          fi